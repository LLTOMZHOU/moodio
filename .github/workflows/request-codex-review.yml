name: Request Codex Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Comment to request Codex review
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            if (pr.draft && action !== "ready_for_review") {
              core.info("Draft PR opened or reopened; waiting until it is ready for review.");
              return;
            }

            const body = [
              "<!-- codex-review-request -->",
              "@codex review for correctness, API/server contract issues, risky assumptions, and regressions."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
